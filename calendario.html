<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário — Agenda Personal Trainer</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div>
            <h1>💪 <span>Agenda</span> Personal Trainer</h1>
            <div class="nav-calendario" style="margin-top:8px;">
                <button onclick="navegarMes(-1)">◀</button>
                <span id="mesAnoLabel">Janeiro 2025</span>
                <button onclick="navegarMes(1)">▶</button>
                <button class="btn btn-sm btn-secondary" onclick="irParaHoje()" style="margin-left:8px;">Hoje</button>
            </div>
        </div>
        <div class="header-actions" style="flex-direction:column;align-items:end;gap:8px;">
            <nav class="header-nav">
                <a href="index.html" class="inativo">🏠 Home</a>
                <a href="calendario.html" class="ativo">📆 Calendário</a>
                <a href="cadastro.html" class="inativo">👥 Alunos</a>
            </nav>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-secondary btn-sm" onclick="exportarDados()">📥 Exportar</button>
                <button class="btn btn-secondary btn-sm" onclick="importarDados()">📤 Importar</button>
                <button class="btn btn-danger btn-sm" onclick="limparTudo()">🗑️</button>
            </div>
        </div>
    </header>


    <div class="container">

        <!-- CALENDÁRIO MENSAL -->
        <section class="calendario-mensal">
            <div class="mes-header">
                <h2>📆 Visão Geral do Mês</h2>
                <div class="mes-nav">
                    <button onclick="navegarMes(-1)">◀ Anterior</button>
                    <button onclick="navegarMes(1)">Próximo ▶</button>
                    <button onclick="irParaHoje()">📍 Hoje</button>
                </div>
            </div>
            <div class="calendario-grid" id="calendarioGrid">
                <!-- Renderizado via JS -->
            </div>
            <p style="margin-top:12px;color:#666;font-size:0.8rem;">
                💡 As cores indicam os objetivos dos alunos:
                <span style="color:#ffab91;">Funcional</span> ·
                <span style="color:#90caf9;">Hipertrofia</span> ·
                <span style="color:#a5d6a7;">Emagrecimento</span> ·
                <span style="color:#ce93d8;">Condicionamento</span>
            </p>
        </section>

        <!-- AGENDA DA SEMANA SELECIONADA -->
        <section class="agenda-panel">
            <h2>📅 <span id="semanaLabel">Agenda da Semana</span></h2>
            <p style="color:#666;font-size:0.85rem;margin-bottom:15px;">Clique em um dia no calendário acima para ver a
                semana</p>
            <div class="agenda-grid" id="agendaGridCalendario">
                <!-- Renderizado via JS -->
            </div>
        </section>

    </div>

    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">
    <div class="toast" id="toast"></div>

    <script src="assets/js/dados.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/alunos.js"></script>
    <script src="assets/js/agenda.js"></script>
    <script src="assets/js/calendario.js"></script>
    <script src="assets/js/pagina-calendario.js"></script>


</body>

</html>

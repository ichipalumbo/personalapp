<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Agenda Personal Trainer</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div>
            <h1>💪 <span>Agenda</span> Personal Trainer</h1>
        </div>
        <div class="header-actions" style="flex-direction:column;align-items:end;gap:8px;">
            <nav class="header-nav">
                <a href="index.html" class="inativo">🏠 Home</a>
                <a href="calendario.html" class="inativo">📆 Calendário</a>
                <a href="cadastro.html" class="ativo">👥 Alunos</a>
            </nav>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-secondary btn-sm" onclick="exportarDados()">📥 Exportar</button>
                <button class="btn btn-secondary btn-sm" onclick="importarDados()">📤 Importar</button>
                <button class="btn btn-danger btn-sm" onclick="limparTudo()">🗑️</button>
            </div>
        </div>
    </header>


    <div class="container">

        <!-- CABEÇALHO + BOTÃO NOVO ALUNO -->
        <section
            style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:20px;">
            <div>
                <h2 style="color:#FFD700;margin-bottom:5px;">👥 Cadastro de Alunos</h2>
                <span style="color:#888;" id="totalAlunosLabel">Total: 0 alunos</span>
            </div>
            <button class="btn btn-primary" onclick="abrirModalNovoAluno()">➕ Novo Aluno</button>
        </section>

        <!-- LISTA DE ALUNOS -->
        <section>
            <div
                style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:15px;">
                <h3 style="color:#ccc;">📋 Lista de Alunos</h3>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <input type="text" id="inputBusca" placeholder="🔍 Buscar aluno..."
                        style="padding:8px 14px;border:1px solid #333;border-radius:8px;background:#0D0D0D;color:#E0E0E0;font-size:0.9rem;outline:none;"
                        oninput="filtrarAlunos()">
                    <select id="filtroObjetivo"
                        style="padding:8px 14px;border:1px solid #333;border-radius:8px;background:#0D0D0D;color:#E0E0E0;font-size:0.9rem;outline:none;"
                        onchange="filtrarAlunos()">
                        <option value="">Todos os objetivos</option>
                        <option value="Funcional">Funcional</option>
                        <option value="Hipertrofia">Hipertrofia</option>
                        <option value="Emagrecimento">Emagrecimento</option>
                        <option value="Condicionamento">Condicionamento</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
            </div>
            <div id="listaAlunosContainer">
                <!-- Renderizado via JS -->
            </div>
        </section>


        <!-- MODAL DE EDIÇÃO -->
        <div class="modal-overlay" id="modalEditar">
            <div class="modal">
                <h3>✏️ Editar Aluno</h3>
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="editNome"
                        style="width:100%;padding:12px;border:1px solid #333;border-radius:8px;background:#0f3460;color:#eee;font-size:1rem;outline:none;">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="editTelefone"
                        style="width:100%;padding:12px;border:1px solid #333;border-radius:8px;background:#0f3460;color:#eee;font-size:1rem;outline:none;">
                </div>
                <div class="form-group">
                    <label>💰 Preço por aula (R$)</label>
                    <input type="number" id="editPreco"
                        style="width:100%;padding:12px;border:1px solid #333;border-radius:8px;background:#0f3460;color:#eee;font-size:1rem;outline:none;"
                        step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label>Objetivo</label>
                    <select id="editObjetivo"
                        style="width:100%;padding:12px;border:1px solid #333;border-radius:8px;background:#0f3460;color:#eee;font-size:1rem;outline:none;">
                        <option value="Funcional">Funcional</option>
                        <option value="Hipertrofia">Hipertrofia</option>
                        <option value="Emagrecimento">Emagrecimento</option>
                        <option value="Condicionamento">Condicionamento</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="fecharModalEditar()">Cancelar</button>
                    <button class="btn btn-primary" onclick="salvarEdicao()">💾 Salvar</button>
                </div>
            </div>
        </div>
        <!-- MODAL DE NOVO ALUNO -->
        <div class="modal-overlay" id="modalNovoAluno">
            <div class="modal">
                <h3>➕ Cadastrar Novo Aluno</h3>

                <div class="form-group">
                    <label>👤 Nome do Aluno *</label>
                    <input type="text" id="novoNome" placeholder="Ex: João Silva"
                        style="width:100%;padding:12px;border:1px solid #333;border-radius:8px;background:#0D0D0D;color:#E0E0E0;font-size:1rem;outline:none;">
                </div>

                <div class="form-group">
                    <label>📍 Local</label>
                    <input type="text" id="novoLocal" placeholder="Ex: Academia Fit, Residência, Parque..."
                        style="width:100%;padding:12px;border:1px solid #333;border-radius:8px;background:#0D0D0D;color:#E0E0E0;font-size:1rem;outline:none;">
                </div>

                <div class="form-group">
                    <label>💰 R$ Hora/Aula</label>
                    <input type="number" id="novoPreco" placeholder="0,00" step="0.01" min="0"
                        style="width:100%;padding:12px;border:1px solid #333;border-radius:8px;background:#0D0D0D;color:#E0E0E0;font-size:1rem;outline:none;">
                </div>

                <div class="form-group">
                    <label>🎯 Objetivo</label>
                    <select id="novoObjetivo"
                        style="width:100%;padding:12px;border:1px solid #333;border-radius:8px;background:#0D0D0D;color:#E0E0E0;font-size:1rem;outline:none;">
                        <option value="Funcional">Funcional</option>
                        <option value="Hipertrofia">Hipertrofia</option>
                        <option value="Emagrecimento">Emagrecimento</option>
                        <option value="Condicionamento">Condicionamento</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="fecharModalNovoAluno()">Cancelar</button>
                    <button class="btn btn-primary" onclick="salvarNovoAluno()">✅ Cadastrar</button>
                </div>
            </div>
        </div>

    </div>

    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">
    <div class="toast" id="toast"></div>

    <script src="assets/js/dados.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/alunos.js"></script>
    <script src="assets/js/pagina-cadastro.js"></script>


</body>

</html>

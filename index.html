<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- ========================================================
         [TAG-HEAD] - Metadados, Título e Estilos Externos
         ======================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtivaMente - Agenda Personal Trainer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Font Awesome para Ícones Modernos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        
        <!-- ========================================================
             [TAG-HEADER] - Menu e Controle Global de Navegação (SPA)
             ======================================================== -->
        <header class="header">
            <!-- Título Principal + Subtítulo da Empresa -->
            <div class="brand-container">
                <h1 class="marca-titulo">
                    <i class="fa-solid fa-dumbbell text-bounce"></i><span class="marca-ativa">Ativa</span><span class="marca-mente">Mente</span>
                </h1>
                <p class="marca-subtitulo">
                    <i class="fa-solid fa-calendar-days"></i>
                    Personal Trainer
                </p>
            </div>
            
            <!-- Barra de Ações com Menu e Utilitários Integrados -->
            <div class="header-actions">
                <nav class="header-nav">
                    <a href="#" class="nav-link ativo" data-target="tela-home">
                        <i class="fa-solid fa-house-chimney nav-icon-anim"></i> Home
                    </a>
                    <a href="#" class="nav-link inativo" data-target="tela-calendario">
                        <i class="fa-solid fa-calendar-week nav-icon-anim"></i> Calendário
                    </a>
                    <a href="#" class="nav-link inativo" data-target="tela-alunos">
                        <i class="fa-solid fa-users nav-icon-anim"></i> Alunos
                    </a>
                </nav>

                <!-- Botões secundários de Backup -->
                <div id="utilitarios-dados">
                    <button class="btn btn-secondary btn-sm" id="btnExportar" title="Exportar Dados">
                        <i class="fa-solid fa-cloud-arrow-down"></i> Exportar
                    </button>
                    <button class="btn btn-secondary btn-sm" id="btnImportar" title="Importar Dados">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Importar
                    </button>
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                </div>
            </div>
        </header>

        <!-- ========================================================
             [TAG-TELA-HOME] - Visão Operacional Diária e Dashboard
             ======================================================== -->
        <main id="tela-home" class="view-section">
            <!-- Subseção: Dashboard de Estatísticas -->
            <section class="alunos-grid" style="margin-bottom: 20px;">
                <div class="card-stat">
                    <span class="stat-numero" id="totalAlunos">0</span>
                    <span class="stat-label">Alunos Ativos</span>
                </div>
                <div class="card-stat">
                    <span class="stat-numero" id="totalAulasSemana">0</span>
                    <span class="stat-label">Aulas Agendadas</span>
                </div>
            </section>

            <!-- Subseção: Grade Horária Diária -->
            <div class="agenda-panel">
                <div class="header" style="margin-bottom: 15px; border-bottom: 1px solid #2A2A2A; padding-bottom: 10px;">
                    <h2 style="font-size: 1.2rem; color: #FFD700; text-align: left;">Sua Agenda</h2>
                    <div class="nav-calendario">
                        <button id="btnAnterior" class="btn"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="dataAtual">Carregando...</span>
                        <button id="btnProximo" class="btn"><i class="fa-solid fa-chevron-right"></i></button>
                        <button id="btnHoje" class="btn btn-secondary btn-sm">Hoje</button>
                    </div>
                </div>

                <!-- Contêiner preenchido dinamicamente via JS -->
                <div class="agenda-dia-container" id="agendaGridHome"></div>
            </div>
        </main>

        <!-- ========================================================
             [TAG-TELA-CALENDARIO] - Visão Mensal Estratégica
             ======================================================== -->
        <main id="tela-calendario" class="view-section" style="display: none;">
            <div class="calendario-mensal">
                <div class="mes-header">
                    <h2 id="nomeMesAno">Carregando...</h2>
                    <div class="mes-nav">
                        <button id="btnMesAnterior" class="btn"><i class="fa-solid fa-chevron-left"></i> Anterior</button>
                        <button id="btnMesProximo" class="btn">Próximo <i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>

                <!-- Grid Mensal Inteligente -->
                <div class="calendario-grid" id="calendarioMensalGrid"></div>
            </div>
        </main>

        <!-- ========================================================
             [TAG-TELA-ALUNOS] - Gerenciamento e Cadastro (CRM)
             ======================================================== -->
        <main id="tela-alunos" class="view-section" style="display: none; padding-bottom: 80px;">
            
            <!-- Listagem Dinâmica dos Alunos -->
            <section class="alunos-panel">
                <h3 style="font-size: 1.1rem; color: #E0E0E0; margin-bottom: 15px;">Seus Alunos</h3>
                <div class="alunos-grid" id="listaAlunos"></div>
            </section>

            <!-- Botão Flutuante Estilo Mobile -->
            <button id="btnFlutuanteAdicionar" onclick="abrirCadastroParaNovo()">
                <i class="fa-solid fa-plus"></i>
            </button>

            <!-- MODAL DE CADASTRO/EDIÇÃO DE ALUNO (Design Limpo e Espaçado via CSS) -->
            <div class="modal-overlay" id="modalFormAluno" style="display: none;">
                <div class="modal-alunos-corpo">
                    <h3 id="tituloFormAluno">Cadastrar Novo Aluno</h3>
                    
                    <form id="formNovoAluno" class="form-aluno">
                        <input type="hidden" id="alunoIdEdicao" value="">

                        <!-- Campo: Nome -->
                        <div class="form-grupo-spa">
                            <label for="alunoNome">Nome completo *</label>
                            <input type="text" id="alunoNome" placeholder="Ex: João Silva" required>
                        </div>
                        
                        <!-- Campo: Local de Treino -->
                        <div class="form-grupo-spa">
                            <label for="alunoLocal">Local de Treino *</label>
                            <input type="text" id="alunoLocal" placeholder="Ex: Academia X ou Condomínio" required>
                        </div>

                        <!-- Campo: Valor Hora/Aula -->
                        <div class="form-grupo-spa">
                            <label for="alunoPreco">Valor Hora/Aula *</label>
                            <input type="number" id="alunoPreco" placeholder="Ex: 80" step="0.01" required>
                        </div>

                        <!-- Campo: Telefone -->
                        <div class="form-grupo-spa">
                            <label for="alunoTelefone">Telefone (Opcional)</label>
                            <input type="tel" id="alunoTelefone" placeholder="(11) 99999-9999">
                        </div>

                        <!-- Campo: Objetivo -->
                        <div class="form-grupo-spa">
                            <label for="alunoObjetivo">Objetivo *</label>
                            <select id="alunoObjetivo" required>
                                <option value="">Selecione...</option>
                                <option value="Hipertrofia">Hipertrofia</option>
                                <option value="Emagrecimento">Emagrecimento</option>
                                <option value="Condicionamento">Condicionamento</option>
                                <option value="Funcional">Funcional</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>

                        <!-- Botões de Ação do Modal -->
                        <div class="modal-alunos-acoes">
                            <button type="button" class="btn btn-secondary" onclick="togglePainelCadastro(false)">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btnSalvarAluno">Salvar Aluno</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

    </div>

    <!-- ========================================================
         [TAG-MODAIS] - Modais Compartilhados (Agendamento, etc)
         ======================================================== -->
    <div class="modal-overlay" id="modalAgendamento" style="display: none;">
        <div class="modal">
            <h3 id="modalTitle">Agendar Aula</h3>
            <form id="formAgendamento">
                <input type="hidden" id="agendaId">
                <input type="hidden" id="agendaData">
                
                <div class="form-group">
                    <label for="agendaAluno">Aluno</label>
                    <select id="agendaAluno" required>
                        <option value="">Selecione um aluno...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Horário</label>
                    <div class="modal-horarios-duplos">
                        <input type="time" id="agendaHoraInicio" required>
                        <span style="color: #AAA;">até</span>
                        <input type="time" id="agendaHoraFim" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="agendaFrequencia">Repetição</label>
                    <select id="agendaFrequencia" required>
                        <option value="uma_vez">Apenas esta data</option>
                        <option value="semanal">Semanalmente</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" id="btnFecharModal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="btnExcluirForm" style="display: none;">Excluir</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Feedback Visual Rápido -->
    <div class="toast" id="toast"></div>

    <!-- ========================================================
         [TAG-SCRIPTS] - Carregamento dos Motores Lógicos
         ======================================================== -->
    <script src="assets/js/dados.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/modal.js"></script>
    <script src="assets/js/agenda.js"></script>
    <script src="assets/js/alunos.js"></script>
    <script src="assets/js/calendario.js"></script>
    
    <!-- Scripts de Interação Visual Específicos -->
    <script src="assets/js/home.js"></script>
    <script src="assets/js/pagina-calendario.js"></script>
    <script src="assets/js/pagina-cadastro.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Personal Trainer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        
        <header class="header">
            <h1>Agenda <span>Personal</span></h1>
            
            <div class="header-actions">
                <nav class="header-nav">
                    <a href="#" class="nav-link ativo" data-target="tela-home"><i class="fa-solid fa-house"></i> Home</a>
                    <a href="#" class="nav-link inativo" data-target="tela-calendario"><i class="fa-solid fa-calendar-days"></i> Calendário</a>
                    <a href="#" class="nav-link inativo" data-target="tela-alunos"><i class="fa-solid fa-user-plus"></i> Alunos</a>
                </nav>
                <div id="utilitarios-dados">
                    <button class="btn btn-secondary btn-sm" id="btnExportar" title="Exportar Dados">
                        <i class="fa-solid fa-file-export"></i>
                    </button>
                    <button class="btn btn-secondary btn-sm" id="btnImportar" title="Importar Dados">
                        <i class="fa-solid fa-file-import"></i>
                    </button>
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                </div>
            </div>
        </header>

        <main id="tela-home" class="view-section">
            <section class="alunos-grid" style="margin-bottom: 20px;">
                <div class="card-stat">
                    <span class="stat-numero" id="totalAlunos">0</span>
                    <span class="stat-label">Alunos Ativos</span>
                </div>
                <div class="card-stat">
                    <span class="stat-numero" id="totalAulasSemana">0</span>
                    <span class="stat-label">Aulas Agendadas</span>
                </div>
            </section>

            <div class="agenda-panel">
                <div class="header" style="margin-bottom: 15px; border-bottom: 1px solid #2A2A2A; padding-bottom: 10px;">
                    <h2 style="font-size: 1.2rem; color: #FFD700; text-align: left;">Sua Agenda</h2>
                    <div class="nav-calendario">
                        <button id="btnAnterior" class="btn"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="dataAtual">Carregando...</span>
                        <button id="btnProximo" class="btn"><i class="fa-solid fa-chevron-right"></i></button>
                        <button id="btnHoje" class="btn btn-secondary btn-sm">Hoje</button>
                    </div>
                </div>

                <div class="agenda-dia-container" id="agendaGridHome"></div>
            </div>
        </main>


        <main id="tela-calendario" class="view-section" style="display: none;">
            <div class="calendario-mensal">
                <div class="mes-header">
                    <h2 id="nomeMesAno">Carregando...</h2>
                    <div class="mes-nav">
                        <button id="btnMesAnterior" class="btn"><i class="fa-solid fa-chevron-left"></i> Anterior</button>
                        <button id="btnMesProximo" class="btn">Próximo <i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>

                <div class="calendario-grid" id="calendarioMensalGrid"></div>
            </div>
        </main>


        <main id="tela-alunos" class="view-section" style="display: none;">
            <div class="alunos-panel">
                <h2 style="font-size: 1.2rem; color: #FFD700; margin-bottom: 15px;">Cadastrar Novo Aluno</h2>
                
                <form id="formNovoAluno" class="form-aluno">
                    <div style="flex: 2; min-width: 200px;">
                        <input type="text" id="alunoNome" placeholder="Nome completo do aluno" required>
                    </div>
                    <div style="flex: 1; min-width: 150px;">
                        <select id="alunoObjetivo" required>
                            <option value="">Selecione o Objetivo...</option>
                            <option value="Hipertrofia">Hipertrofia</option>
                            <option value="Emagrecimento">Emagrecimento</option>
                            <option value="Condicionamento">Condicionamento</option>
                            <option value="Funcional">Funcional</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-plus"></i> Adicionar
                    </button>
                </form>
            </div>

            <section class="alunos-panel">
                <h3 style="font-size: 1.1rem; color: #E0E0E0; margin-bottom: 15px;">Seus Alunos</h3>
                <div class="alunos-grid" id="listaAlunos"></div>
            </section>
        </main>

    </div>

    <div class="modal-overlay" id="modalAgendamento">
        <div class="modal">
            <h3 id="modalTitle">Agendar Aula</h3>
            <form id="formAgendamento">
                <input type="hidden" id="agendaId">
                <input type="hidden" id="agendaData">
                
                <div class="form-group">
                    <label for="agendaAluno">Aluno</label>
                    <select id="agendaAluno" required>
                        <option value="">Selecione um aluno...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Horário</label>
                    <div class="modal-horarios-duplos">
                        <input type="time" id="agendaHoraInicio" required>
                        <span style="color: #AAA;">até</span>
                        <input type="time" id="agendaHoraFim" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="agendaFrequencia">Repetição</label>
                    <select id="agendaFrequencia" required>
                        <option value="uma_vez">Apenas esta data</option>
                        <option value="semanal">Semanalmente</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" id="btnFecharModal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="btnExcluirForm" style="display: none;">Excluir</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

<script src="assets/js/dados.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/agenda.js"></script> <script src="assets/js/alunos.js"></script>
<script src="assets/js/calendario.js"></script>

<script src="assets/js/home.js"></script>
<script src="assets/js/pagina-calendario.js"></script>
<script src="assets/js/pagina-cadastro.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>

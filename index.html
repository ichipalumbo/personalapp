<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home — Agenda Personal Trainer</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div>
            <h1>💪 <span>Agenda</span> Personal Trainer</h1>
        </div>
        <div class="header-actions" style="flex-direction:column;align-items:end;gap:8px;">
            <nav class="header-nav">
                <a href="index.html" class="ativo">🏠 Home</a>
                <a href="calendario.html" class="inativo">📆 Calendário</a>
                <a href="cadastro.html" class="inativo">👥 Alunos</a>
            </nav>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-secondary btn-sm" onclick="exportarDados()">📥 Exportar</button>
                <button class="btn btn-secondary btn-sm" onclick="importarDados()">📤 Importar</button>
                <button class="btn btn-danger btn-sm" onclick="limparTudo()">🗑️</button>
            </div>
        </div>
    </header>


    <div class="container">

        <!-- ESTATÍSTICAS RÁPIDAS -->
        <section
            style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:30px;">
            <div class="card-stat">
                <span class="stat-numero" id="statAlunos">0</span>
                <span class="stat-label">Alunos Ativos</span>
            </div>
            <div class="card-stat">
                <span class="stat-numero" id="statAulasHoje">0</span>
                <span class="stat-label">Aulas Hoje</span>
            </div>
            <div class="card-stat">
                <span class="stat-numero" id="statAulasSemana">0</span>
                <span class="stat-label">Aulas na Semana</span>
            </div>
            <div class="card-stat">
                <span class="stat-numero" id="statFaturamento">R$ 0</span>
                <span class="stat-label">Faturamento Semanal</span>
            </div>
        </section>

        <!-- SELEÇÃO DE VISÃO: DIA OU SEMANA -->
        <section style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
            <button class="btn btn-primary" id="btnVisaoDia" onclick="setVisao('dia')">📆 Agenda do Dia</button>
            <button class="btn btn-secondary" id="btnVisaoSemana" onclick="setVisao('semana')">📅 Agenda da
                Semana</button>
        </section>

        <!-- AGENDA (DIA OU SEMANA) -->
        <section class="agenda-panel" id="painelAgendaHome">
            <h2>📅 <span id="homeTituloAgenda">Agenda do Dia</span></h2>
            <div class="agenda-grid" id="agendaGridHome">
                <!-- Renderizado via JS -->
            </div>
        </section>


    </div>

    <!-- MODAL (reaproveitado) -->
    <!-- MODAL (com cadastro rápido) -->
    <div class="modal-overlay" id="modalAgendar">
        <div class="modal">
            <h3>📌 Agendar Aula</h3>
            <p style="margin-bottom:15px;color:#aaa;" id="modalInfo"></p>

            <div class="form-group">
                <label>Selecione o Aluno</label>
                <div style="display:flex;gap:8px;align-items:center;">
                    <select id="modalSelectAluno" style="flex:1;"></select>
                    <button class="btn btn-sm btn-primary" onclick="toggleCadastroRapido()" id="btnCadastroRapido"
                        style="white-space:nowrap;">➕ Novo</button>
                </div>
            </div>

            <!-- Cadastro Rápido (oculto inicialmente) -->
            <div id="cadastroRapidoContainer"
                style="display:none;margin-bottom:15px;padding:15px;background:#0D0D0D;border-radius:8px;border:1px solid #2A2A2A;">
                <h4 style="color:#FFD700;margin-bottom:10px;font-size:0.9rem;">➕ Cadastro Rápido</h4>
                <div style="display:flex;flex-direction:column;gap:8px;">
                    <input type="text" id="rapidoNome" placeholder="Nome do aluno"
                        style="padding:10px;border:1px solid #333;border-radius:8px;background:#0D0D0D;color:#E0E0E0;font-size:0.9rem;outline:none;">
                    <div style="display:flex;gap:8px;">
                        <input type="text" id="rapidoTelefone" placeholder="Telefone"
                            style="flex:1;padding:10px;border:1px solid #333;border-radius:8px;background:#0D0D0D;color:#E0E0E0;font-size:0.9rem;outline:none;">
                        <input type="number" id="rapidoPreco" placeholder="Preço" step="0.01" min="0"
                            style="width:100px;padding:10px;border:1px solid #333;border-radius:8px;background:#0D0D0D;color:#E0E0E0;font-size:0.9rem;outline:none;">
                    </div>
                    <select id="rapidoObjetivo"
                        style="padding:10px;border:1px solid #333;border-radius:8px;background:#0D0D0D;color:#E0E0E0;font-size:0.9rem;outline:none;">
                        <option value="Funcional">Funcional</option>
                        <option value="Hipertrofia">Hipertrofia</option>
                        <option value="Emagrecimento">Emagrecimento</option>
                        <option value="Condicionamento">Condicionamento</option>
                        <option value="Outro">Outro</option>
                    </select>
                    <div style="display:flex;gap:8px;justify-content:end;">
                        <button class="btn btn-sm btn-secondary" onclick="toggleCadastroRapido()">Cancelar</button>
                        <button class="btn btn-sm btn-success" onclick="cadastrarRapido()">✅ Cadastrar</button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Período da Aula</label>
                <div class="modal-horarios-duplos">
                    <select id="modalHorarioInicio"></select>
                    <span>até</span>
                    <select id="modalHorarioFim"></select>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="confirmarAgendamento()">Agendar</button>
            </div>
        </div>
    </div>


    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleImport(event)">
    <div class="toast" id="toast"></div>

    <script src="assets/js/dados.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/alunos.js"></script>
    <script src="assets/js/agenda.js"></script>
    <script src="assets/js/modal.js"></script>
    <script src="assets/js/home.js"></script>


</body>

</html>
